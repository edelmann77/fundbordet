<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // Matches the 404 redirect behavior used for GitHub Pages SPA deployments.
      (function () {
        var path = window.location.pathname;
        var segments = path.split("/").filter(Boolean);
        var repoBase = segments.length > 0 ? "/" + segments[0] + "/" : "/";
        window.location.replace(repoBase + "index.html");
      })();
    </script>
  </head>
  <body>
    Redirecting to app...
  </body>
</html>
